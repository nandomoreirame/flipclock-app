name: flipclock
arch: ${ARCH}
version: 1.2.0
release: 1
section: utils
priority: optional
maintainer: Fernando Moreira <nandomoreira.me@gmail.com>
description: Minimal desktop flip clock widget built with Go and Fyne v2
vendor: nandomoreirame
homepage: https://github.com/nandomoreirame/flipclock-app
license: MIT

depends:
  - libgl1
  - libxi6
  - libxcursor1
  - libxrandr2
  - libxinerama1
  - libxxf86vm1

contents:
  - src: fyne-cross/bin/linux-${ARCH}/flipclock
    dst: /usr/bin/flipclock
    expand: true
    file_info:
      mode: 0755

  - src: com.flipclock.app.desktop
    dst: /usr/share/applications/com.flipclock.app.desktop

  - src: images/flipclock.png
    dst: /usr/share/icons/hicolor/256x256/apps/com.flipclock.app.png

  - src: images/flipclock.svg
    dst: /usr/share/icons/hicolor/scalable/apps/com.flipclock.app.svg

  - src: com.flipclock.app.metainfo.xml
    dst: /usr/share/metainfo/com.flipclock.app.metainfo.xml
